server {
    listen 80;
    listen [::]:80;
    server_name bakerysoft.net www.bakerysoft.net;

    root /var/www/bakerysoft.net;
    index index.html;
    add_header X-Served-By "jarvis-rpi-nginx" always;

    access_log /var/log/nginx/bakerysoft.net.access.log;
    error_log /var/log/nginx/bakerysoft.net.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
